# OpenReward + EndlessTerminals + IPA chunk-level loss config (v2)
# Based on openreward_endless_terminals_IPA_qwen35_2b.yaml with these fixes:
#   - LR scheduler: constant_with_warmup (fixes LR=0 after step 123)
#   - batch_adjust_mode: delete (no duplicate padding that distorts IS ratio)
#   - Dedicated 4+4 GPU split: GPUs 0-3 train, GPUs 4-7 infer
#   - async_generation_ratio: 2 (deeper buffer, less idle)
#   - TrajEnvManager mode: formulate_mode=traj (1 sample per trajectory)
#
# Usage (fresh training):
#   Set: max_steps=200, resume_from_checkpoint=false, async_generation_ratio=64
#   python examples/start_agentic_pipeline.py \
#     --config_path agentic_demo \
#     --config_name openreward_endless_terminals_IPA_qwen35_2b_v2
#
# Usage (continue from checkpoint):
#   Set: max_steps=<target>, resume_from_checkpoint="/data/<run>/checkpoint-<step>"
#   Keep async_generation_ratio=64 for training throughput
#
# Usage (eval only — validate a checkpoint):
#   Set: max_steps=<ckpt_step+2>, eval_steps=1, val_batch_size=32
#   Set: resume_from_checkpoint="/data/<run>/checkpoint-<step>"
#   Set: async_generation_ratio=1, rollout_batch_size=4  (avoid wasting GPU on unused train rollouts)
#   The pipeline skips to ckpt_step, runs 1 step with validation, then exits

defaults:
  - ../config/deepspeed_zero@_here_
  - ../config/deepspeed_zero2@_here_
  - ../config/deepspeed_zero3@_here_
  - ../config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "openreward_endless_terminals_IPA_qwen35_2b_v2"
seed: 42

logging_dir: ./output/logs
output_dir: ./output
model_name: ${exp_name}-${now:%Y%m%d_%H%M%S}
rollout_dump_dir: /home/ubuntu/ALE-new/ROLL/output/rollout_dump
system_envs:
  USE_MODELSCOPE: '1'

checkpoint_config:
  type: file_system
  output_dir: /data

num_gpus_per_node: 8
rpc_timeout: 72000

max_steps: 200
save_steps: 50
logging_steps: 1
eval_steps: 0                            # disabled — val can hang on hard tasks and block training
resume_from_checkpoint: false

async_generation_ratio: 16              # deep buffer for continuous training
parse_tool_call_parameter_to_dict: true
skip_mock_system_prompt: true

track_with: wandb
tracker_kwargs:
  api_key: ${oc.env:WANDB_API_KEY}
  project: roll-agentic-new
  name: ${exp_name}

rollout_batch_size: 16
val_batch_size: 4
sequence_length: 32768

max_tokens_per_step: 4096

# --- IPA chunk-level loss config ---
ppo_epochs: 1
adv_estimator: "step_reinforce"
batch_adjust_mode: "delete"              # v2: trim excess — no duplicate padding
step_reward_gamma: 0.95                  # chunk-level temporal credit: G_k = 0.95^{K-k} * R_final
ipa_failure_reward: ~                    # positive rewards only — no penalty for failures
ratio_type: "segment"                    # chunk-level geometric mean IS ratio

init_kl_coef: 0.0
whiten_advantages: false                 # IPA uses absolute returns, no relative ranking
entropy_loss_coef: 0
max_grad_norm: 1.0

# Non-trivial IS ratio: use vLLM rollout logprobs as old_log_probs (not recomputed Megatron)
force_disable_old_logprobs_recompute: true

# Train-infer mismatch mask (paper Section 8): chunk-level segment filter
train_infer_correction:
  is_weight:
    enabled: false                       # IPA handles IS internally
  filters:
    - enabled: true
      agg_type: segment                  # chunk-level geometric mean mismatch
      ratio_enabled: true
      ratio_low: 0.0
      ratio_high: 5.0                    # threshold H; chunks above are masked out

# --- Model configs ---
pretrain: /home/ubuntu/ALE-new/model-checkpoints/Qwen3.5-2B 
reward_pretrain: /home/ubuntu/ALE-new/model-checkpoints/Qwen3.5-2B 
actor_train:
  worker_cls: roll.pipeline.agentic.agentic_actor_pg_worker.ActorWorker
  pg_variant: "ipa_chunk"                # chunk-level IPA loss (paper Eq. 9)
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
    freeze_module_prefix: vision_model
  training_args:
    learning_rate: 1.0e-6
    lr_scheduler_type: "constant_with_warmup"  # v2: prevents LR decay to 0
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    warmup_steps: 10                     # v2: 10 warmup steps
  data_args:
    template: qwen3_coder
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 2
      sequence_parallel: true
      use_distributed_optimizer: true
      recompute_granularity: full
  device_mapping: list(range(0,4))
  infer_batch_size: 1
actor_infer:
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${max_tokens_per_step}
    top_p: 1.0
    top_k: 50
    num_beams: 1
    temperature: 1.0
    num_return_sequences: 1
    stop_strings: ["</tool_call>"]
    include_stop_str_in_output: true
  data_args:
    template: qwen3_coder
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
      tensor_parallel_size: 1
      max_model_len: 32768
  device_mapping: list(range(4,8))       # GPUs [4,5,6,7]

reference:
  model_args:
    attn_implementation: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
    freeze_module_prefix: vision_model
  data_args:
    template: qwen3_coder
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 2
  device_mapping: list(range(0,4))       # GPUs [0,1,2,3] — shares with actor_train
  infer_batch_size: 1

# IPA uses absolute returns — no reward normalization
reward_normalization:
  grouping: traj_group_id
  method: identity

# --- Environment config (OpenReward) ---
max_actions_per_traj: 15                 # 25 turns max
env_manager_cls: roll.pipeline.agentic.env_manager.agent_native_env_manager.AgentNativeStepEnvManager

train_env_manager:
  max_env_num_per_worker: 1
  num_env_groups: 8                     # 8 parallel env workers for faster rollout
  group_size: 1
  tags: [OpenRewardEndlessTerminalsTrain]
  num_groups_partition: [8]

val_env_manager:
  max_env_num_per_worker: 1
  num_env_groups: 4
  group_size: 1
  tags: [OpenRewardEndlessTerminalsVal]
  num_groups_partition: [4]

custom_envs:
  OpenRewardEndlessTerminalsTrain:
    formulate_mode: "traj"               # v2: one sample per trajectory (TrajEnvManager mode)
    env_type: "openreward_env"
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    agent_system_template: "unused — system prompt built dynamically from OpenReward tool specs"
    agent_template: "unused — observation is full message list from OpenRewardEnv"
    env_config:
      environment_name: "kanishk/EndlessTerminals"
      split: "train"
      mode: "train"
      max_steps: ${max_actions_per_traj}
      reward_reduction: "sum"
      nonterminal_reward: 0.0
      retry_max_attempts: 3
      retry_backoff_seconds: 5.0
  OpenRewardEndlessTerminalsVal:
    formulate_mode: "traj"               # v2: one sample per trajectory
    env_type: "openreward_env"
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    agent_system_template: "unused"
    agent_template: "unused"
    env_config:
      environment_name: "kanishk/EndlessTerminals"
      split: "train"
      mode: "val"
      max_steps: ${max_actions_per_traj}
      reward_reduction: "sum"
      nonterminal_reward: 0.0
