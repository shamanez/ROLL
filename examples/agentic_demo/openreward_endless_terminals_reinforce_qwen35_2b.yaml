# OpenReward + EndlessTerminals + STEP_REINFORCE (vanilla PG) config
# Simpler baseline without IPA chunk-level loss.
# The model IS the agent — no iflow, no sandbox, no anti_call_llm.
#
# Usage:
#   bash examples/agentic_demo/run_openreward_endless_terminals.sh reinforce
#   # or directly:
#   python examples/start_agentic_pipeline.py \
#     --config_path agentic_demo \
#     --config_name openreward_endless_terminals_reinforce_qwen35_2b

defaults:
  - ../config/deepspeed_zero@_here_
  - ../config/deepspeed_zero2@_here_
  - ../config/deepspeed_zero3@_here_
  - ../config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "openreward_endless_terminals_reinforce_qwen35_2b"
seed: 42

logging_dir: ./output/logs
output_dir: ./output
model_name: ${exp_name}-${now:%Y%m%d_%H%M%S}
rollout_dump_dir: /home/ubuntu/ROLL-PR/ROLL/output/rollout_dump
system_envs:
  USE_MODELSCOPE: '1'
  OPENREWARD_API_KEY: ${oc.env:OPENREWARD_API_KEY}

checkpoint_config:
  type: file_system
  output_dir: /data

num_gpus_per_node: 8
rpc_timeout: 72000

max_steps: 5000
save_steps: 50
logging_steps: 1
eval_steps: 25                           # full validation every 25 steps
resume_from_checkpoint: false

async_generation_ratio: 8               # async buffer depth (8 pipeline steps ahead)
parse_tool_call_parameter_to_dict: true
skip_mock_system_prompt: true

track_with: wandb
tracker_kwargs:
  api_key: ${oc.env:WANDB_API_KEY}
  project: roll-agentic-topr
  name: ${exp_name}

rollout_batch_size: 16                   # trajectories collected per pipeline step
val_batch_size: 200                      # run all 200 held-out validation tasks per eval
sequence_length: 32768

max_tokens_per_step: 4096

# --- TOPR + chunk-level config (IPA-equivalent via composable components) ---
# Positive chunks: weighted SFT (no IS ratio). Negative chunks: TIS [0,1].
# With binary 0/1 rewards, negative G_k=0, so positive-only training by default.
# No advantage_clip — G_k values (1.0, 0.95, 0.90...) must pass through unclipped
# to preserve chunk-level temporal credit from Eq. 7.
ppo_epochs: 1
adv_estimator: "step_reinforce"
batch_adjust_mode: "delete"              # trim excess — no duplicate padding
filter_positive_only: true               # drop zero-reward samples before training; TOPR loss is zero for failures
step_reward_gamma: 0.95                  # chunk-level temporal credit: G_k = 0.95^{K-k} * R_final
ratio_type: "segment"                    # chunk-level geometric mean IS ratio (paper Eq. 8)
ratio_reference: "infer"                 # use vLLM infer_logprobs as behavior policy (true off-policy ratio)

init_kl_coef: 0.0
whiten_advantages: false                 # use absolute returns, no relative ranking
entropy_loss_coef: 0
max_grad_norm: 1.0

# Skip redundant Megatron old_log_probs recompute (ratio ≈ 1.0 with ppo_epochs=1).
# train_infer_correction still runs inside the worker using fresh log_probs vs vLLM infer_logprobs.
force_disable_old_logprobs_recompute: true

# Train-infer mismatch mask: filter chunks where policy has drifted from vLLM rollout
train_infer_correction:
  is_weight:
    enabled: false
  filters:
    - enabled: true
      agg_type: segment                  # chunk-level geometric mean mismatch
      ratio_enabled: true
      ratio_low: 0.0
      ratio_high: 5.0                    # threshold H; chunks above are masked out

# --- Model configs ---
pretrain: /home/ubuntu/ALE-latest/model-checkpoints/Qwen3.5-2B
reward_pretrain: /home/ubuntu/ALE-latest/model-checkpoints/Qwen3.5-2B
actor_train:
  worker_cls: roll.pipeline.agentic.agentic_actor_pg_worker.ActorWorker
  pg_variant: "topr"                       # positive=SFT, negative=TIS[0,1] (paper Eq. 5/9)
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
    freeze_module_prefix: vision_model
  training_args:
    learning_rate: 1.0e-6
    lr_scheduler_type: "constant_with_warmup"  # prevents LR decay to 0
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 64       # with filter_positive_only + ~12% success: positive samples fit in one accum window → 1 optimizer step/pipeline step
    warmup_steps: 10
  data_args:
    template: qwen3_coder
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 2
      sequence_parallel: true
      use_distributed_optimizer: true
      recompute_granularity: full
  device_mapping: list(range(0,4))
  infer_batch_size: 1
actor_infer:
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${max_tokens_per_step}
    top_p: 1.0
    top_k: 50
    num_beams: 1
    temperature: 1.0
    num_return_sequences: 1
    stop_strings: ["</tool_call>"]
    include_stop_str_in_output: true
  data_args:
    template: qwen3_coder
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
      tensor_parallel_size: 1
      max_model_len: 32768
  device_mapping: list(range(4,8))       # GPUs [4,5,6,7]

reference:
  model_args:
    attn_implementation: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
    freeze_module_prefix: vision_model
  data_args:
    template: qwen3_coder
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      context_parallel_size: 2
  device_mapping: list(range(0,4))
  infer_batch_size: 1

reward_normalization:
  grouping: traj_group_id
  method: identity

# --- Environment config (OpenReward) ---
max_actions_per_traj: 20
env_manager_cls: roll.pipeline.agentic.env_manager.agent_native_env_manager.AgentNativeStepEnvManager

train_env_manager:
  max_env_num_per_worker: 1
  num_env_groups: 8                     # 8 parallel env workers for faster rollout
  group_size: 1
  tags: [OpenRewardEndlessTerminalsTrain]
  num_groups_partition: [8]
  system_envs:
    OPENREWARD_API_KEY: ${oc.env:OPENREWARD_API_KEY}

val_env_manager:
  max_env_num_per_worker: 1
  num_env_groups: 4
  group_size: 1
  tags: [OpenRewardEndlessTerminalsVal]
  num_groups_partition: [4]
  system_envs:
    OPENREWARD_API_KEY: ${oc.env:OPENREWARD_API_KEY}

custom_envs:
  OpenRewardEndlessTerminalsTrain:
    env_type: "openreward_env"
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    agent_system_template: "unused — system prompt built dynamically from OpenReward tool specs"
    agent_template: "unused — observation is full message list from OpenRewardEnv"
    env_config:
      environment_name: "kanishk/EndlessTerminals"
      split: "train"
      mode: "train"
      val_size: 200                      # first 200 tasks held out; training draws from index 200..num_tasks-1
      max_steps: ${max_actions_per_traj}
      reward_reduction: "sum"
      nonterminal_reward: 0.0
      retry_max_attempts: 3
      retry_backoff_seconds: 5.0
  OpenRewardEndlessTerminalsVal:
    env_type: "openreward_env"
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    env_manager_cls: ${env_manager_cls}
    agent_system_template: "unused"
    agent_template: "unused"
    env_config:
      environment_name: "kanishk/EndlessTerminals"
      split: "train"
      mode: "val"
      val_size: 200                      # validation draws from task indices 0..199 only
      max_steps: ${max_actions_per_traj}
      reward_reduction: "sum"
      nonterminal_reward: 0.0
